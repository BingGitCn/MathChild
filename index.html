<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>小学工具集 · MathChild</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #fdfbf6;
      --ink: #1c1b1a;
      --ink-soft: #4a4844;
      --crimson: #c8324c;
      --accent: #2d5f3f;
      --bg: #1a1a1a;
      --bg-soft: #232323;
      --line: #3a3835;
      --muted: #8a857d;
      --gold: #d4a84b;
      --ff-display: "Noto Serif SC", "Songti SC", serif;
      --ff-mono: "JetBrains Mono", "Courier New", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--ff-display);
      background: var(--bg);
      color: #e8e3da;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(212,168,75,.04), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200,50,76,.03), transparent 50%);
      pointer-events: none;
    }
    .container {
      max-width: 720px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .hero {
      text-align: center;
      margin-bottom: 56px;
    }
    .hero-icon {
      font-size: 48px;
      color: var(--gold);
      margin-bottom: 16px;
      letter-spacing: .1em;
    }
    .hero h1 {
      font-family: var(--ff-display);
      font-size: 32px;
      font-weight: 900;
      color: #f5f0e6;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .hero p {
      font-family: var(--ff-mono);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .section {
      margin-bottom: 40px;
    }
    .section-title {
      font-family: var(--ff-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-left: 4px;
    }
    .section-title span {
      color: var(--gold);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .card {
      display: flex;
      flex-direction: column;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px 20px;
      text-decoration: none;
      color: inherit;
      transition: all .2s;
      cursor: pointer;
    }
    .card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .card-icon {
      font-size: 28px;
      margin-bottom: 14px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: rgba(212,168,75,.1);
    }
    .card h3 {
      font-family: var(--ff-display);
      font-size: 16px;
      font-weight: 900;
      color: #f5f0e6;
      margin-bottom: 6px;
    }
    .card p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .footer {
      text-align: center;
      padding: 20px 0;
      font-family: var(--ff-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .05em;
    }
    @media (max-width: 480px) {
      .hero h1 { font-size: 26px; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-icon">∑</div>
      <h1>小学工具集</h1>
      <p>MathChild · Print Tools</p>
    </div>

    <div class="section">
      <div class="section-title"><span>●</span> 学生工具</div>
      <div class="cards">
        <a href="arithmetic.html" class="card">
          <div class="card-icon">∑</div>
          <h3>算术练习卷</h3>
          <p>口算 / 竖式，加减乘除，三档难度，A4 打印</p>
        </a>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span>●</span> 家长工具</div>
      <div class="cards">
        <a href="practice-log.html" class="card">
          <div class="card-icon">📋</div>
          <h3>练习记录表</h3>
          <p>每日练习打卡，记录时间、内容与完成情况</p>
        </a>
        <a href="score-tracker.html" class="card">
          <div class="card-icon">📊</div>
          <h3>成绩追踪表</h3>
          <p>记录每次练习成绩，跟踪正确率变化趋势</p>
        </a>
        <a href="study-plan.html" class="card">
          <div class="card-icon">📅</div>
          <h3>学习计划表</h3>
          <p>制定每周 / 每月学习计划，打印张贴</p>
        </a>
      </div>
    </div>

    <div class="footer">
      Made with ❤ for 小学生学习
    </div>
  </div>
</body>
</html>
