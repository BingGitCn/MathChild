<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>课程表 · 纸上时光</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="parent-tools.css">
  <style>
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .schedule-table th, .schedule-table td {
      border: 1px solid #ccc;
      text-align: center;
      font-size: 14px;
      height: 52px;
      padding: 6px;
    }
    .schedule-table th {
      background: rgba(212,168,75,.12);
      font-weight: 700;
      color: var(--ink);
      border-color: var(--ink-soft);
    }
    .schedule-table .time-col {
      width: 90px;
      font-family: var(--ff-mono);
      font-size: 12px;
      color: var(--ink-soft);
      background: rgba(0,0,0,.02);
    }
    .schedule-table .period-col {
      width: 50px;
      font-weight: 700;
      color: var(--ink-soft);
    }
    .schedule-table .empty-slot {
      color: #ccc;
    }
    .schedule-table .lunch-row td {
      background: rgba(212,168,75,.06);
      font-weight: 700;
      color: var(--ink-soft);
      height: 36px;
    }
    .header-info {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .header-info .field {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-info label {
      font-weight: 700;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <a href="index.html" class="back-link" title="返回首页">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="logo-icon">📅</span>
        <div class="logo-text">
          <h1>课程表</h1>
          <p>Class Schedule</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btnPrint" class="ghost-btn" title="打印">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          <span class="label">打印</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="output" class="output"></div>
  </main>

  <script>
    (function() {
      "use strict";

      var WEEKDAYS = ['周一', '周二', '周三', '周四', '周五'];
      var PERIODS = [
        { num: 1, time: '8:00-8:40' },
        { num: 2, time: '8:50-9:30' },
        { num: 3, time: '9:45-10:25' },
        { num: 4, time: '10:35-11:15' },
        { num: 5, time: '11:25-12:05' },
        { num: 6, time: '14:00-14:40' },
        { num: 7, time: '14:50-15:30' },
        { num: 8, time: '15:45-16:25' }
      ];

      function renderPaper() {
        var headerRow = '<tr><th class="time-col">节次</th><th class="time-col">时间</th>';
        WEEKDAYS.forEach(function(d) { headerRow += '<th>' + d + '</th>'; });
        headerRow += '</tr>';

        var bodyRows = '';
        PERIODS.forEach(function(p, i) {
          if (i === 4) {
            bodyRows += '<tr class="lunch-row"><td colspan="7">午 休</td></tr>';
          }
          var row = '<td class="period-col">第' + p.num + '节</td>';
          row += '<td class="time-col">' + p.time + '</td>';
          WEEKDAYS.forEach(function() {
            row += '<td></td>';
          });
          bodyRows += '<tr>' + row + '</tr>';
        });

        var paper = '<section class="paper">' +
          '<div class="paper-header">' +
            '<span>班级：<span class="underline-field">&nbsp;</span></span>' +
            '<span>学期：<span class="underline-field">&nbsp;</span></span>' +
          '</div>' +
          '<div class="paper-title">课程表</div>' +
          '<table class="schedule-table">' +
            '<thead>' + headerRow + '</thead>' +
            '<tbody>' + bodyRows + '</tbody>' +
          '</table>' +
          '<div class="paper-footer"><span>合理安排时间 · 提高学习效率</span></div>' +
        '</section>';

        return paper;
      }

      function renderAll() {
        var html = renderPaper();
        var isMobile = window.matchMedia("(max-width: 1024px)").matches;
        if (isMobile) {
          document.getElementById('output').innerHTML = '<div class="paper-stage"><div class="paper-scaler">' + html + '</div></div>';
        } else {
          document.getElementById('output').innerHTML = html;
        }
        updateScale();
      }

      var PAPER_W = 794;
      function updateScale() {
        var stage = document.querySelector('.paper-stage');
        if (!stage) return;
        var scaler = stage.querySelector('.paper-scaler');
        var paper = stage.querySelector('.paper');
        if (!scaler || !paper) return;
        var avail = window.innerWidth - 24;
        var scale = Math.min(1, avail / PAPER_W);
        scaler.style.transform = 'scale(' + scale + ')';
        scaler.style.transformOrigin = 'top center';
        scaler.style.width = PAPER_W + 'px';
        stage.style.width = '100%';
        stage.style.height = (paper.offsetHeight * scale) + 'px';
        stage.style.overflow = 'hidden';
      }

      renderAll();
      window.addEventListener('resize', function() { renderAll(); });
      document.getElementById('btnPrint').addEventListener('click', function() { window.print(); });
    })();
  </script>
</body>
</html>
