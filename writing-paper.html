<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>作文稿纸 · 纸上时光</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="parent-tools.css">
  <style>
    .paper {
      display: flex;
      flex-direction: column;
    }
    .paper-title {
      margin: 16px 0 12px;
    }
    .writing-grid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      flex: 1;
      border: 1px solid #ccc;
    }
    .writing-cell {
      border: 1px solid #ddd;
      position: relative;
    }
    .writing-cell.margin {
      border-left: 2px solid var(--crimson);
    }
    .writing-cell.num {
      background: rgba(212,168,75,.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ff-mono);
      font-size: 9px;
      color: var(--ink-soft);
    }
    .page-num {
      text-align: right;
      font-family: var(--ff-mono);
      font-size: 10px;
      color: var(--ink-soft);
      margin-top: 6px;
      padding-top: 4px;
      border-top: 1px dashed #ccc;
    }
    @media print {
      .paper {
        height: calc(297mm - 20mm - 15mm);
      }
      .writing-cell {
        border-color: #999;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <a href="index.html" class="back-link" title="返回首页">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="logo-icon">📝</span>
        <div class="logo-text">
          <h1>作文稿纸</h1>
          <p>Writing Paper</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btnPrint" class="ghost-btn" title="打印">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          <span class="label">打印</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="output" class="output"></div>
  </main>

  <script>
    (function() {
      "use strict";

      var ROWS = 16;
      var COLS = 20;

      function renderPaper() {
        var cells = '';
        for (var r = 0; r < ROWS; r++) {
          for (var c = 0; c < COLS; c++) {
            if (c === 0) {
              cells += '<div class="writing-cell num">' + ((r * COLS) + c + 1) + '</div>';
            } else if (c === 1) {
              cells += '<div class="writing-cell margin"></div>';
            } else {
              cells += '<div class="writing-cell"></div>';
            }
          }
        }

        var paper = '<section class="paper">' +
          '<div class="paper-header">' +
            '<span>题目：<span class="underline-field" style="min-width:200px">&nbsp;</span></span>' +
            '<span>姓名：<span class="underline-field">&nbsp;</span></span>' +
          '</div>' +
          '<div class="paper-title">作文稿纸</div>' +
          '<div class="writing-grid" style="grid-template-rows: repeat(' + ROWS + ', 1fr)">' + cells + '</div>' +
          '<div class="page-num">共 ' + (ROWS * COLS) + ' 字</div>' +
        '</section>';

        return paper;
      }

      function renderAll() {
        var html = renderPaper();
        var isMobile = window.matchMedia("(max-width: 1024px)").matches;
        if (isMobile) {
          document.getElementById('output').innerHTML = '<div class="paper-stage"><div class="paper-scaler">' + html + '</div></div>';
        } else {
          document.getElementById('output').innerHTML = html;
        }
        updateScale();
      }

      var PAPER_W = 794;
      function updateScale() {
        var stage = document.querySelector('.paper-stage');
        if (!stage) return;
        var scaler = stage.querySelector('.paper-scaler');
        var paper = stage.querySelector('.paper');
        if (!scaler || !paper) return;
        var avail = window.innerWidth - 24;
        var scale = Math.min(1, avail / PAPER_W);
        scaler.style.transform = 'scale(' + scale + ')';
        scaler.style.transformOrigin = 'top center';
        scaler.style.width = PAPER_W + 'px';
        stage.style.width = '100%';
        stage.style.height = (paper.offsetHeight * scale) + 'px';
        stage.style.overflow = 'hidden';
      }

      renderAll();
      window.addEventListener('resize', function() { renderAll(); });
      document.getElementById('btnPrint').addEventListener('click', function() { window.print(); });
    })();
  </script>
</body>
</html>
