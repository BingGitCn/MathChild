<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>九九乘法表 · 算术手札</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="parent-tools.css">
  <style>
    .mult-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .mult-table th, .mult-table td {
      border: 1px solid #ccc;
      text-align: center;
      font-family: var(--ff-mono);
      font-size: 14px;
      height: 52px;
      padding: 4px;
    }
    .mult-table th {
      background: rgba(212,168,75,.15);
      font-weight: 700;
      color: var(--ink);
      border-color: var(--ink-soft);
    }
    .mult-table .formula {
      color: var(--ink);
    }
    .mult-table .highlight {
      background: rgba(200,50,76,.06);
    }
    .mult-table .empty { border-color: transparent; }
    .options-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .option-group label {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-soft);
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--ink);
      cursor: pointer;
    }
    .checkbox-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--crimson);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <a href="index.html" class="back-link" title="返回首页">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="logo-icon">×</span>
        <div class="logo-text">
          <h1>九九乘法表</h1>
          <p>Multiplication Table</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btnPrint" class="ghost-btn" title="打印">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          <span class="label">打印</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="output" class="output"></div>
  </main>

  <script>
    (function() {
      "use strict";

      var showAnswer = true;

      function renderPaper() {
        var headerRow = '<tr><th class="empty">×</th>';
        for (var i = 1; i <= 9; i++) {
          headerRow += '<th>' + i + '</th>';
        }
        headerRow += '</tr>';

        var bodyRows = '';
        for (var r = 1; r <= 9; r++) {
          var row = '<th>' + r + '</th>';
          for (var c = 1; c <= 9; c++) {
            var result = r * c;
            var cls = (r === c) ? 'formula highlight' : 'formula';
            if (showAnswer) {
              row += '<td class="' + cls + '">' + r + '×' + c + '=' + result + '</td>';
            } else {
              row += '<td class="' + cls + '">' + r + '×' + c + '=<span class="blank-cell"></span></td>';
            }
          }
          bodyRows += '<tr>' + row + '</tr>';
        }

        var paper = '<section class="paper">' +
          '<div class="paper-header">' +
            '<span>姓名：<span class="underline-field">&nbsp;</span></span>' +
            '<span>九九乘法表</span>' +
          '</div>' +
          '<div class="paper-title">九九乘法表</div>' +
          '<div class="options-row">' +
            '<label class="checkbox-row"><input type="checkbox" id="chkAnswer" ' + (showAnswer ? 'checked' : '') + '> 显示答案</label>' +
          '</div>' +
          '<table class="mult-table">' +
            '<thead>' + headerRow + '</thead>' +
            '<tbody>' + bodyRows + '</tbody>' +
          '</table>' +
          '<div class="paper-footer"><span>熟记乘法表，计算更迅速</span></div>' +
        '</section>';

        var isMobile = window.matchMedia("(max-width: 1024px)").matches;
        if (isMobile) {
          document.getElementById('output').innerHTML = '<div class="paper-stage"><div class="paper-scaler">' + paper + '</div></div>';
        } else {
          document.getElementById('output').innerHTML = paper;
        }
        updateScale();

        document.getElementById('chkAnswer').addEventListener('change', function() {
          showAnswer = this.checked;
          renderPaper();
        });
      }

      var PAPER_W = 794;
      function updateScale() {
        var stage = document.querySelector('.paper-stage');
        if (!stage) return;
        var scaler = stage.querySelector('.paper-scaler');
        var paper = stage.querySelector('.paper');
        if (!scaler || !paper) return;
        var avail = window.innerWidth - 24;
        var scale = Math.min(1, avail / PAPER_W);
        scaler.style.transform = 'scale(' + scale + ')';
        scaler.style.transformOrigin = 'top center';
        scaler.style.width = PAPER_W + 'px';
        stage.style.width = '100%';
        stage.style.height = (paper.offsetHeight * scale) + 'px';
        stage.style.overflow = 'hidden';
      }

      renderPaper();
      window.addEventListener('resize', function() { renderPaper(); });
      document.getElementById('btnPrint').addEventListener('click', function() { window.print(); });
    })();
  </script>
</body>
</html>
