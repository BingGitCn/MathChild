<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>待办清单 · 纸上时光</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="parent-tools.css">
  <style>
    .todo-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .todo-table th, .todo-table td {
      border: 1px solid #ccc;
      padding: 10px 8px;
      font-size: 13px;
    }
    .todo-table th {
      background: rgba(212,168,75,.12);
      font-weight: 700;
      color: var(--ink);
      border-color: var(--ink-soft);
      text-align: center;
    }
    .todo-table .check-col { width: 50px; text-align: center; }
    .todo-table .num-col { width: 44px; text-align: center; }
    .todo-table .task-col { text-align: left; }
    .todo-table .note-col { width: 160px; color: var(--ink-soft); font-size: 12px; }
    .check-box {
      display: inline-block;
      width: 18px; height: 18px;
      border: 1.5px solid #999;
      border-radius: 3px;
    }

    /* 编辑面板 */
    .edit-panel {
      max-width: 794px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .edit-section {
      margin-bottom: 24px;
    }
    .edit-section h3 {
      font-family: var(--ff-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .05em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .item-row .task-input {
      flex: 1;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: var(--ff-display);
      font-size: 14px;
      color: var(--text-color);
      outline: none;
      transition: border-color .15s;
    }
    .item-row .task-input:focus { border-color: var(--gold); }
    .item-row .note-input {
      width: 140px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: var(--ff-display);
      font-size: 13px;
      color: var(--text-color);
      outline: none;
      transition: border-color .15s;
    }
    .item-row .note-input:focus { border-color: var(--gold); }
    .item-row .num-label {
      width: 28px;
      text-align: center;
      font-family: var(--ff-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--crimson);
      flex-shrink: 0;
      opacity: .7;
    }
    .item-row .del-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    .item-row .del-btn:hover { border-color: var(--crimson); color: var(--crimson); }
    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      border: 1.5px dashed var(--line);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: var(--ff-display);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .add-btn:hover { border-color: var(--gold); color: var(--text-color); }
    .edit-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .title-input {
      width: 100%;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: var(--ff-display);
      font-size: 18px;
      font-weight: 900;
      color: var(--text-color);
      text-align: center;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 16px;
    }
    .title-input:focus { border-color: var(--gold); }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--ff-mono); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <a href="index.html" class="back-link" title="返回首页">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="logo-icon">&#9745;</span>
        <div class="logo-text">
          <h1>待办清单</h1>
          <p>Todo List · A4 Print</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btnPrint" class="ghost-btn" title="打印">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          <span class="label">打印</span>
        </button>
        <button id="btnEdit" class="ghost-btn" title="编辑">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span class="label">编辑</span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="切换主题">&#9788;</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="output" class="output"></div>
  </main>

  <script>
    (function() {
      "use strict";

      var STORAGE_KEY = 'todo-list-data';

      var state = {
        title: '待办清单',
        items: [
          { task: '完成数学作业', note: '' },
          { task: '阅读课外书 30 分钟', note: '' },
          { task: '练习钢琴', note: '' }
        ],
        editing: false
      };

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ title: state.title, items: state.items }));
      }

      function load() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            var d = JSON.parse(raw);
            if (d && Array.isArray(d.items)) {
              state.title = d.title || '待办清单';
              state.items = d.items;
            }
          }
        } catch(e) {}
      }

      function renderPaper() {
        var headerRow = '<tr>' +
          '<th class="check-col">&#10003;</th>' +
          '<th class="num-col">No.</th>' +
          '<th class="task-col">待办事项</th>' +
          '<th class="note-col">备注</th>' +
        '</tr>';

        var bodyRows = '';
        state.items.forEach(function(item, i) {
          bodyRows += '<tr>' +
            '<td class="check-col"><span class="check-box"></span></td>' +
            '<td class="num-col" style="font-family:var(--ff-mono);font-size:12px;color:var(--ink-soft)">' + (i + 1) + '</td>' +
            '<td class="task-col" style="font-size:14px">' + escHtml(item.task) + '</td>' +
            '<td class="note-col">' + escHtml(item.note) + '</td>' +
          '</tr>';
        });

        // 补空行到至少 15 行，打印时留出手写空间
        var minRows = 15;
        for (var r = state.items.length; r < minRows; r++) {
          bodyRows += '<tr>' +
            '<td class="check-col"><span class="check-box"></span></td>' +
            '<td class="num-col" style="font-family:var(--ff-mono);font-size:12px;color:var(--ink-soft)">' + (r + 1) + '</td>' +
            '<td class="task-col"></td>' +
            '<td class="note-col"></td>' +
          '</tr>';
        }

        return '<section class="paper">' +
          '<div class="paper-header">' +
            '<span>姓名：<span class="underline-field">&nbsp;</span></span>' +
            '<span>日期：<span class="underline-field">&nbsp;</span></span>' +
          '</div>' +
          '<div class="paper-title">' + escHtml(state.title) + '</div>' +
          '<table class="todo-table">' +
            '<thead>' + headerRow + '</thead>' +
            '<tbody>' + bodyRows + '</tbody>' +
          '</table>' +
          '<div class="paper-footer">共 ' + state.items.length + ' 项 · 逐项完成，逐项打勾</div>' +
        '</section>';
      }

      function renderEditPanel() {
        var html = '<div class="edit-panel">' +
          '<div class="edit-section">' +
            '<input type="text" class="title-input" id="editTitle" value="' + escAttr(state.title) + '" placeholder="清单标题">' +
          '</div>' +
          '<div class="edit-section">' +
            '<h3>待办事项</h3>' +
            '<div id="editItems">';

        state.items.forEach(function(item, i) {
          html += '<div class="item-row">' +
            '<span class="num-label">' + (i + 1) + '.</span>' +
            '<input type="text" class="task-input" data-idx="' + i + '" value="' + escAttr(item.task) + '" placeholder="输入待办事项">' +
            '<input type="text" class="note-input" data-idx="' + i + '" data-field="note" value="' + escAttr(item.note) + '" placeholder="备注">' +
            '<button class="del-btn" data-idx="' + i + '" title="删除">&#215;</button>' +
          '</div>';
        });

        html += '</div>' +
            '<button class="add-btn" id="addItemBtn">+ 添加一项</button>' +
          '</div>' +
          '<div class="edit-actions">' +
            '<button class="primary-btn" id="previewBtn" style="flex:1">预览 A4</button>' +
            '<button class="primary-btn" id="savePrintBtn" style="flex:1;background:var(--accent)">保存并打印</button>' +
          '</div>' +
          '<div class="hint">编辑内容会自动保存到浏览器，关掉页面再回来也不丢失。</div>' +
        '</div>';

        return html;
      }

      function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
      function escAttr(s) {
        return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      // ---------- 渲染 ----------
      function render() {
        var output = document.getElementById('output');
        if (state.editing) {
          output.innerHTML = renderEditPanel();
          bindEditPanel();
        } else {
          var html = renderPaper();
          var isMobile = window.matchMedia("(max-width: 1024px)").matches;
          if (isMobile) {
            output.innerHTML = '<div class="paper-stage"><div class="paper-scaler">' + html + '</div></div>';
          } else {
            output.innerHTML = html;
          }
          updateScale();
        }
      }

      // ---------- 编辑面板交互 ----------
      function bindEditPanel() {
        var titleInput = document.getElementById('editTitle');
        if (titleInput) {
          titleInput.addEventListener('input', function() {
            state.title = this.value || '待办清单';
            save();
          });
        }

        // 事项输入
        document.querySelectorAll('.task-input').forEach(function(input) {
          input.addEventListener('input', function() {
            var idx = parseInt(this.dataset.idx, 10);
            state.items[idx].task = this.value;
            save();
          });
        });

        // 备注输入
        document.querySelectorAll('.note-input').forEach(function(input) {
          input.addEventListener('input', function() {
            var idx = parseInt(this.dataset.idx, 10);
            state.items[idx].note = this.value;
            save();
          });
        });

        // 删除
        document.querySelectorAll('.del-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var idx = parseInt(this.dataset.idx, 10);
            state.items.splice(idx, 1);
            save();
            render();
          });
        });

        // 添加
        document.getElementById('addItemBtn').addEventListener('click', function() {
          state.items.push({ task: '', note: '' });
          save();
          render();
          // 聚焦新输入框
          var inputs = document.querySelectorAll('.task-input');
          if (inputs.length) inputs[inputs.length - 1].focus();
        });

        // 预览
        document.getElementById('previewBtn').addEventListener('click', function() {
          state.editing = false;
          render();
        });

        // 保存并打印
        document.getElementById('savePrintBtn').addEventListener('click', function() {
          save();
          state.editing = false;
          render();
          setTimeout(function() { window.print(); }, 200);
        });
      }

      // ---------- A4 缩放 ----------
      var PAPER_W = 794;
      function updateScale() {
        var stage = document.querySelector('.paper-stage');
        if (!stage) return;
        var scaler = stage.querySelector('.paper-scaler');
        var paper = stage.querySelector('.paper');
        if (!scaler || !paper) return;
        var avail = window.innerWidth - 24;
        var scale = Math.min(1, avail / PAPER_W);
        scaler.style.transform = 'scale(' + scale + ')';
        scaler.style.transformOrigin = 'top center';
        scaler.style.width = PAPER_W + 'px';
        stage.style.width = '100%';
        stage.style.height = (paper.offsetHeight * scale) + 'px';
        stage.style.overflow = 'hidden';
      }

      // ---------- 初始化 ----------
      load();
      render();

      // 顶部按钮
      document.getElementById('btnPrint').addEventListener('click', function() {
        if (state.editing) {
          state.editing = false;
          render();
        }
        setTimeout(function() { window.print(); }, 100);
      });
      document.getElementById('btnEdit').addEventListener('click', function() {
        state.editing = !state.editing;
        var label = this.querySelector('.label');
        if (label) label.textContent = state.editing ? '预览' : '编辑';
        render();
      });

      window.addEventListener('resize', function() { if (!state.editing) updateScale(); });
    })();

    // 主题切换
    (function() {
      var toggle = document.getElementById('themeToggle');
      var html = document.documentElement;
      var savedTheme = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', savedTheme);
      updateIcon(savedTheme);

      toggle.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon(next);
      });

      function updateIcon(theme) {
        toggle.textContent = theme === 'dark' ? '\u2600' : '\u263E';
      }
    })();
  </script>
</body>
</html>
