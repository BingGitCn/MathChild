<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>拼音练习纸 · 纸上时光</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="parent-tools.css">
  <style>
    .pinyin-grid {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .pinyin-row {
      display: flex;
      align-items: stretch;
      height: 56px;
      border-bottom: 1px solid #ccc;
    }
    .pinyin-cell {
      flex: 1;
      border-right: 1px solid #eee;
      position: relative;
    }
    .pinyin-cell:last-child { border-right: none; }
    .pinyin-row .line {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px solid #ddd;
    }
    .line-top { top: 14px; }
    .line-mid { top: 28px; }
    .line-bottom { top: 42px; }
    .pinyin-row .line:first-child { top: 0; border-top: none; }
    .four-line {
      position: relative;
      height: 56px;
    }
    .four-line .fl {
      position: absolute;
      left: 0;
      right: 0;
      height: 0;
      border-top: 1px solid #ccc;
    }
    .fl-1 { top: 0; }
    .fl-2 { top: 25%; }
    .fl-3 { top: 50%; }
    .fl-4 { top: 75%; }
    .fl-5 { top: 100%; }
    .row-num {
      width: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ff-mono);
      font-size: 11px;
      color: var(--ink-soft);
      border-right: 1px solid #ccc;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <a href="index.html" class="back-link" title="返回首页">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="logo-icon">ㄅ</span>
        <div class="logo-text">
          <h1>拼音练习纸</h1>
          <p>Pinyin Practice</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btnPrint" class="ghost-btn" title="打印">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          <span class="label">打印</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="output" class="output"></div>
  </main>

  <script>
    (function() {
      "use strict";

      var ROWS = 12;
      var COLS = 8;

      function renderPaper(pageNo) {
        var rows = '';
        for (var r = 0; r < ROWS; r++) {
          var cells = '<div class="row-num">' + (r + 1) + '</div>';
          for (var c = 0; c < COLS; c++) {
            cells += '<div class="four-line">' +
              '<div class="fl fl-1"></div>' +
              '<div class="fl fl-2"></div>' +
              '<div class="fl fl-3"></div>' +
              '<div class="fl fl-4"></div>' +
              '<div class="fl fl-5"></div>' +
            '</div>';
          }
          rows += '<div class="pinyin-row">' + cells + '</div>';
        }

        var paper = '<section class="paper">' +
          '<div class="paper-header">' +
            '<span>姓名：<span class="underline-field">&nbsp;</span></span>' +
            '<span>日期：<span class="underline-field">&nbsp;</span></span>' +
          '</div>' +
          '<div class="paper-title">拼音练习纸</div>' +
          '<div class="pinyin-grid">' + rows + '</div>' +
          '<div class="paper-footer"><span>四线三格 · 练好拼音基础</span></div>' +
        '</section>';

        return paper;
      }

      function renderAll() {
        var html = renderPaper(1);
        var isMobile = window.matchMedia("(max-width: 1024px)").matches;
        if (isMobile) {
          document.getElementById('output').innerHTML = '<div class="paper-stage"><div class="paper-scaler">' + html + '</div></div>';
        } else {
          document.getElementById('output').innerHTML = html;
        }
        updateScale();
      }

      var PAPER_W = 794;
      function updateScale() {
        var stage = document.querySelector('.paper-stage');
        if (!stage) return;
        var scaler = stage.querySelector('.paper-scaler');
        var paper = stage.querySelector('.paper');
        if (!scaler || !paper) return;
        var avail = window.innerWidth - 24;
        var scale = Math.min(1, avail / PAPER_W);
        scaler.style.transform = 'scale(' + scale + ')';
        scaler.style.transformOrigin = 'top center';
        scaler.style.width = PAPER_W + 'px';
        stage.style.width = '100%';
        stage.style.height = (paper.offsetHeight * scale) + 'px';
        stage.style.overflow = 'hidden';
      }

      renderAll();
      window.addEventListener('resize', function() { renderAll(); });
      document.getElementById('btnPrint').addEventListener('click', function() { window.print(); });
    })();
  </script>
</body>
</html>
