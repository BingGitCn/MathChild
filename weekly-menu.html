<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>每周菜单 · 纸上时光</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="parent-tools.css">
  <style>
    .menu-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .menu-table th, .menu-table td {
      border: 1px solid #ccc;
      padding: 10px 8px;
      font-size: 13px;
      vertical-align: middle;
    }
    .menu-table th {
      background: rgba(212,168,75,.12);
      font-weight: 700;
      color: var(--ink);
      border-color: var(--ink-soft);
      text-align: center;
    }
    .menu-table .day-col { width: 60px; text-align: center; font-weight: 700; }
    .menu-table .meal-col { text-align: center; font-weight: 700; width: 56px; color: var(--ink-soft); }
    .menu-table .food-col { text-align: left; font-size: 14px; }

    /* 编辑面板 */
    .edit-panel { max-width: 794px; margin: 0 auto; padding: 0 24px 80px; }
    .edit-section { margin-bottom: 24px; }
    .edit-section h3 {
      font-family: var(--ff-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .05em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .day-group { margin-bottom: 16px; }
    .day-label {
      font-family: var(--ff-display);
      font-size: 14px;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .meal-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: center;
    }
    .meal-label {
      width: 48px;
      font-family: var(--ff-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-align: right;
      flex-shrink: 0;
    }
    .meal-input {
      flex: 1;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: var(--ff-display);
      font-size: 14px;
      color: var(--text-color);
      outline: none;
      transition: border-color .15s;
    }
    .meal-input:focus { border-color: var(--gold); }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--ff-mono); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <a href="index.html" class="back-link" title="返回首页">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="logo-icon">&#127860;</span>
        <div class="logo-text">
          <h1>每周菜单</h1>
          <p>Weekly Menu · A4 Print</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btnPrint" class="ghost-btn" title="打印">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          <span class="label">打印</span>
        </button>
        <button id="btnEdit" class="ghost-btn" title="编辑">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span class="label">编辑</span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="切换主题">&#9788;</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="output" class="output"></div>
  </main>

  <script>
    (function() {
      "use strict";

      var STORAGE_KEY = 'weekly-menu-data';
      var DAYS = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
      var MEALS = ['早餐', '午餐', '晚餐'];

      var state = {
        weeks: DAYS.map(function() {
          return { breakfast: '', lunch: '', dinner: '' };
        }),
        editing: false
      };

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ weeks: state.weeks }));
      }

      function load() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            var d = JSON.parse(raw);
            if (d && Array.isArray(d.weeks) && d.weeks.length === 7) {
              state.weeks = d.weeks;
            }
          }
        } catch(e) {}
      }

      function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function renderPaper() {
        var headerRow = '<tr><th class="day-col">星期</th>';
        MEALS.forEach(function(m) { headerRow += '<th>' + m + '</th>'; });
        headerRow += '</tr>';

        var bodyRows = '';
        state.weeks.forEach(function(day, i) {
          bodyRows += '<tr>' +
            '<td class="day-col">' + DAYS[i] + '</td>' +
            '<td class="food-col">' + (escHtml(day.breakfast) || '<span style="color:#ccc">—</span>') + '</td>' +
            '<td class="food-col">' + (escHtml(day.lunch) || '<span style="color:#ccc">—</span>') + '</td>' +
            '<td class="food-col">' + (escHtml(day.dinner) || '<span style="color:#ccc">—</span>') + '</td>' +
          '</tr>';
        });

        var totalItems = state.weeks.reduce(function(s, d) {
          return s + (d.breakfast ? 1 : 0) + (d.lunch ? 1 : 0) + (d.dinner ? 1 : 0);
        }, 0);

        return '<section class="paper">' +
          '<div class="paper-header">' +
            '<span>家庭：<span class="underline-field">&nbsp;</span></span>' +
            '<span>第 <span class="underline-field" style="min-width:40px">&nbsp;</span> 周</span>' +
          '</div>' +
          '<div class="paper-title">每 周 菜 单</div>' +
          '<table class="menu-table">' +
            '<thead>' + headerRow + '</thead>' +
            '<tbody>' + bodyRows + '</tbody>' +
          '</table>' +
          '<div class="paper-footer">共安排 ' + totalItems + ' 餐 · 合理搭配 · 营养均衡</div>' +
        '</section>';
      }

      function renderEditPanel() {
        var html = '<div class="edit-panel"><div class="edit-section"><h3>一周三餐</h3>';

        DAYS.forEach(function(day, di) {
          html += '<div class="day-group">' +
            '<div class="day-label">' + day + '</div>' +
            '<div class="meal-row">' +
              '<span class="meal-label">早餐</span>' +
              '<input type="text" class="meal-input" data-day="' + di + '" data-meal="breakfast" value="' + escHtml(state.weeks[di].breakfast) + '" placeholder="如：小米粥、鸡蛋">' +
            '</div>' +
            '<div class="meal-row">' +
              '<span class="meal-label">午餐</span>' +
              '<input type="text" class="meal-input" data-day="' + di + '" data-meal="lunch" value="' + escHtml(state.weeks[di].lunch) + '" placeholder="如：番茄炒蛋、米饭">' +
            '</div>' +
            '<div class="meal-row">' +
              '<span class="meal-label">晚餐</span>' +
              '<input type="text" class="meal-input" data-day="' + di + '" data-meal="dinner" value="' + escHtml(state.weeks[di].dinner) + '" placeholder="如：清蒸鱼、青菜">' +
            '</div>' +
          '</div>';
        });

        html += '</div>' +
          '<div class="edit-actions">' +
            '<button class="primary-btn" id="previewBtn" style="flex:1">预览 A4</button>' +
            '<button class="primary-btn" id="savePrintBtn" style="flex:1;background:var(--accent)">保存并打印</button>' +
          '</div>' +
          '<div class="hint">编辑内容自动保存到浏览器，关掉页面再回来也不丢失。</div>' +
        '</div>';

        return html;
      }

      function render() {
        var output = document.getElementById('output');
        if (state.editing) {
          output.innerHTML = renderEditPanel();
          bindEditPanel();
        } else {
          var html = renderPaper();
          var isMobile = window.matchMedia("(max-width: 1024px)").matches;
          if (isMobile) {
            output.innerHTML = '<div class="paper-stage"><div class="paper-scaler">' + html + '</div></div>';
          } else {
            output.innerHTML = html;
          }
          updateScale();
        }
      }

      function bindEditPanel() {
        document.querySelectorAll('.meal-input').forEach(function(input) {
          input.addEventListener('input', function() {
            var di = parseInt(this.dataset.day, 10);
            state.weeks[di][this.dataset.meal] = this.value;
            save();
          });
        });

        document.getElementById('previewBtn').addEventListener('click', function() {
          state.editing = false;
          render();
        });

        document.getElementById('savePrintBtn').addEventListener('click', function() {
          save();
          state.editing = false;
          render();
          setTimeout(function() { window.print(); }, 200);
        });
      }

      var PAPER_W = 794;
      function updateScale() {
        var stage = document.querySelector('.paper-stage');
        if (!stage) return;
        var scaler = stage.querySelector('.paper-scaler');
        var paper = stage.querySelector('.paper');
        if (!scaler || !paper) return;
        var avail = window.innerWidth - 24;
        var scale = Math.min(1, avail / PAPER_W);
        scaler.style.transform = 'scale(' + scale + ')';
        scaler.style.transformOrigin = 'top center';
        scaler.style.width = PAPER_W + 'px';
        stage.style.width = '100%';
        stage.style.height = (paper.offsetHeight * scale) + 'px';
        stage.style.overflow = 'hidden';
      }

      load();
      render();

      document.getElementById('btnPrint').addEventListener('click', function() {
        if (state.editing) { state.editing = false; render(); }
        setTimeout(function() { window.print(); }, 100);
      });
      document.getElementById('btnEdit').addEventListener('click', function() {
        state.editing = !state.editing;
        var label = this.querySelector('.label');
        if (label) label.textContent = state.editing ? '预览' : '编辑';
        render();
      });

      window.addEventListener('resize', function() { if (!state.editing) updateScale(); });
    })();

    (function() {
      var toggle = document.getElementById('themeToggle');
      var html = document.documentElement;
      var savedTheme = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', savedTheme);
      updateIcon(savedTheme);
      toggle.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon(next);
      });
      function updateIcon(theme) {
        toggle.textContent = theme === 'dark' ? '\u2600' : '\u263E';
      }
    })();
  </script>
</body>
</html>
