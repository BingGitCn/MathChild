<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>格子纸 · 纸上时光</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="parent-tools.css">
  <style>
    .grid-paper {
      display: grid;
      gap: 0;
      border: 1px solid #999;
    }
    .grid-cell {
      aspect-ratio: 1;
      border: 1px solid #ccc;
      background: #fff;
    }
    .grid-cell.empty { border-color: transparent; }
    .options-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .option-group label {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-soft);
    }
    .option-group select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--ff-display);
      background: #fff;
      color: var(--ink);
    }
    .color-options {
      display: flex;
      gap: 6px;
    }
    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .15s;
    }
    .color-btn:hover, .color-btn.active {
      border-color: var(--ink);
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <a href="index.html" class="back-link" title="返回首页">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="logo-icon">▦</span>
        <div class="logo-text">
          <h1>格子纸</h1>
          <p>Grid Paper</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btnPrint" class="ghost-btn" title="打印">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          <span class="label">打印</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="output" class="output"></div>
  </main>

  <script>
    (function() {
      "use strict";

      var gridSize = 25;
      var lineColor = '#ccc';

      function renderPaper() {
        var rows = Math.floor(240 / gridSize);
        var cols = Math.floor(180 / gridSize);
        var cells = '';
        for (var i = 0; i < rows * cols; i++) {
          cells += '<div class="grid-cell"></div>';
        }

        var paper = '<section class="paper">' +
          '<div class="paper-header">' +
            '<span>用途：<span class="underline-field" style="min-width:200px">&nbsp;</span></span>' +
          '</div>' +
          '<div class="paper-title">格子纸</div>' +
          '<div class="options-row">' +
            '<div class="option-group">' +
              '<label>格子大小：</label>' +
              '<select id="gridSize">' +
                '<option value="15">小 (15mm)</option>' +
                '<option value="20">中 (20mm)</option>' +
                '<option value="25" selected>大 (25mm)</option>' +
              '</select>' +
            '</div>' +
            '<div class="option-group">' +
              '<label>线条颜色：</label>' +
              '<div class="color-options">' +
                '<button class="color-btn active" data-color="#ccc" style="background:#ccc"></button>' +
                '<button class="color-btn" data-color="#999" style="background:#999"></button>' +
                '<button class="color-btn" data-color="#c8d7c4" style="background:#c8d7c4"></button>' +
                '<button class="color-btn" data-color="#d4e4f7" style="background:#d4e4f7"></button>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div id="gridContainer" class="grid-paper" style="grid-template-columns: repeat(' + cols + ', 1fr); border-color: ' + lineColor + '">' + cells + '</div>' +
          '<div class="paper-footer"><span>数学画图 · 坐标练习 · 自由创作</span></div>' +
        '</section>';

        return paper;
      }

      function renderAll() {
        var html = renderPaper();
        var isMobile = window.matchMedia("(max-width: 1024px)").matches;
        if (isMobile) {
          document.getElementById('output').innerHTML = '<div class="paper-stage"><div class="paper-scaler">' + html + '</div></div>';
        } else {
          document.getElementById('output').innerHTML = html;
        }
        updateScale();
        bindOptions();
      }

      function updateGrid() {
        var rows = Math.floor(240 / gridSize);
        var cols = Math.floor(180 / gridSize);
        var container = document.getElementById('gridContainer');
        container.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
        container.style.borderColor = lineColor;
        var cells = '';
        for (var i = 0; i < rows * cols; i++) {
          cells += '<div class="grid-cell" style="border-color:' + lineColor + '"></div>';
        }
        container.innerHTML = cells;
      }

      function bindOptions() {
        document.getElementById('gridSize').addEventListener('change', function() {
          gridSize = parseInt(this.value, 10);
          updateGrid();
          updateScale();
        });
        document.querySelectorAll('.color-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.color-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            lineColor = this.dataset.color;
            updateGrid();
          });
        });
      }

      var PAPER_W = 794;
      function updateScale() {
        var stage = document.querySelector('.paper-stage');
        if (!stage) return;
        var scaler = stage.querySelector('.paper-scaler');
        var paper = stage.querySelector('.paper');
        if (!scaler || !paper) return;
        var avail = window.innerWidth - 24;
        var scale = Math.min(1, avail / PAPER_W);
        scaler.style.transform = 'scale(' + scale + ')';
        scaler.style.transformOrigin = 'top center';
        scaler.style.width = PAPER_W + 'px';
        stage.style.width = '100%';
        stage.style.height = (paper.offsetHeight * scale) + 'px';
        stage.style.overflow = 'hidden';
      }

      renderAll();
      window.addEventListener('resize', function() { renderAll(); });
      document.getElementById('btnPrint').addEventListener('click', function() { window.print(); });
    })();
  </script>
</body>
</html>
