<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>比大小 · 算术手札</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <a href="index.html" class="back-link" title="返回首页">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="logo-mark">≷</span>
        <div class="logo-text">
          <h1>比大小</h1>
          <p>Compare Numbers</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btnAnswer" class="ghost-btn" title="显示/隐藏答案" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="label">答案</span>
        </button>
        <button id="btnPrint" class="ghost-btn" title="打印" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          <span class="label">打印</span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>
        <button id="btnMenu" class="menu-btn" aria-label="设置">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <aside id="panel" class="panel" aria-hidden="false">
    <div class="panel-head">
      <h2>出题设置</h2>
      <button id="panelClose" class="panel-close" aria-label="关闭">×</button>
    </div>
    <div class="panel-body">
      <div class="field">
        <label class="field-label" for="maxNum">数字上限</label>
        <div class="num-input-row">
          <input type="number" id="maxNum" value="20" min="2" max="999" class="num-input">
          <div class="quick-btns">
            <button type="button" class="quick-btn" data-val="10">10</button>
            <button type="button" class="quick-btn" data-val="20">20</button>
            <button type="button" class="quick-btn" data-val="50">50</button>
            <button type="button" class="quick-btn" data-val="100">100</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="perPage">每页题数 <span class="muted" id="countMeta">= 40 题</span></label>
        <input type="range" id="perPage" min="12" max="40" step="4" value="20">
        <div class="range-ticks"><span>少</span><span>多</span></div>
      </div>
      <div class="field">
        <label class="field-label" for="pages">页数</label>
        <div class="seg" id="pagesSeg">
          <button class="seg-btn active" data-pages="1">1</button>
          <button class="seg-btn" data-pages="2">2</button>
          <button class="seg-btn" data-pages="3">3</button>
        </div>
      </div>
      <button id="generate" class="primary-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        生成新卷
      </button>
    </div>
  </aside>

  <div id="overlay" class="overlay" hidden></div>

  <main class="main">
    <div id="output" class="output"></div>
  </main>

  <script>
    (function() {
      "use strict";

      var state = { questions: [], showAnswer: false, perPage: 20, pages: 1 };

      var rand = function(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; };

      function makeQuestion(maxN) {
        var a = rand(0, maxN);
        var b = rand(0, maxN);
        var op;
        if (a > b) op = '>';
        else if (a < b) op = '<';
        else op = '=';
        return { a: a, b: b, op: op };
      }

      function generateAll(maxN, perPage, pages) {
        var list = [];
        var total = perPage * pages;
        for (var i = 0; i < total; i++) {
          list.push(makeQuestion(maxN));
        }
        return list;
      }

      function renderQuestion(q, idx) {
        var delay = Math.min(idx * 0.01, 0.4);
        return '<div class="q-h" style="animation-delay:' + delay + 's">' +
          '<span class="num">' + idx + '.</span>' +
          '<span class="opd">' + q.a + '</span>' +
          '<span class="sign">?</span>' +
          '<span class="opd">' + q.b + '</span>' +
          '<span class="blank"><span class="ans-wrap">' + q.op + '</span></span>' +
        '</div>';
      }

      function renderPaper(questions, start, perPage, showMeta, pageNo, totalPages) {
        var slice = questions.slice(start, start + perPage);
        var cols = perPage <= 20 ? 5 : 4;
        var items = '';
        slice.forEach(function(q, i) {
          items += renderQuestion(q, start + i + 1);
        });
        var meta = '';
        if (showMeta) {
          meta = '<div class="paper-header">' +
            '<span>姓名：<span class="underline-field">&nbsp;</span></span>' +
            '<span>日期：<span class="underline-field">&nbsp;</span></span>' +
            '<span>得分：<span class="underline-field">&nbsp;</span></span>' +
          '</div>';
        }
        return '<section class="paper">' + meta +
          '<div class="paper-title">比大小<br><span class="page-no">第 ' + pageNo + ' / ' + totalPages + ' 页</span></div>' +
          '<div class="grid-horizontal" style="grid-template-columns: repeat(' + cols + ', 1fr)">' + items + '</div>' +
          '<div class="paper-footer">本页 ' + slice.length + ' 题 · 用 &gt; &lt; = 填空</div>' +
        '</section>';
      }

      function readConfig() {
        var maxN = parseInt(document.getElementById('maxNum').value, 10);
        if (!maxN || maxN < 2) maxN = 20;
        var perPage = parseInt(document.getElementById('perPage').value, 10);
        var cols = perPage <= 20 ? 5 : 4;
        perPage = cols * Math.ceil(perPage / cols);
        var pages = parseInt(document.querySelector('#pagesSeg .active').dataset.pages, 10);
        var showMeta = true;
        return { maxN: maxN, perPage: perPage, cols: cols, pages: pages, showMeta: showMeta };
      }

      function regenerate() {
        var cfg = readConfig();
        state.questions = generateAll(cfg.maxN, cfg.perPage, cfg.pages);
        state.perPage = cfg.perPage;
        state.pages = cfg.pages;
        render();
        closePanel();
        document.querySelector('.main').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function render() {
        var output = document.getElementById('output');
        enableActions(state.questions.length > 0);
        if (state.questions.length === 0) { output.innerHTML = ''; return; }
        var isMobile = window.matchMedia("(max-width: 1024px)").matches;
        var html = '';
        for (var p = 0; p < state.pages; p++) {
          var start = p * state.perPage;
          html += renderPaper(state.questions, start, state.perPage, state.showMeta, p + 1, state.pages);
        }
        if (isMobile) {
          output.innerHTML = '<div class="paper-stage"><div class="paper-scaler">' + html + '</div></div>';
        } else {
          output.innerHTML = html;
        }
        updateScale();
        applyAnswerClass();
      }

      function applyAnswerClass() {
        document.body.classList.toggle('show-ans', state.showAnswer);
        var btn = document.getElementById('btnAnswer');
        var label = btn.querySelector('.label');
        if (label) label.textContent = state.showAnswer ? '隐藏' : '答案';
      }

      function enableActions(on) {
        document.getElementById('btnPrint').disabled = !on;
        document.getElementById('btnAnswer').disabled = !on;
      }

      function updateScale() {
        var stage = document.querySelector('.paper-stage');
        if (!stage) return;
        var scaler = stage.querySelector('.paper-scaler');
        var papers = stage.querySelectorAll('.paper');
        if (!scaler || papers.length === 0) return;
        var PAPER_W = 794;
        var avail = window.innerWidth - 24;
        var scale = Math.min(1, avail / PAPER_W);
        scaler.style.transform = 'scale(' + scale + ')';
        scaler.style.transformOrigin = 'top center';
        scaler.style.width = PAPER_W + 'px';
        var totalH = 0;
        papers.forEach(function(p) { totalH += p.offsetHeight + 28; });
        stage.style.width = '100%';
        stage.style.height = (totalH * scale) + 'px';
        stage.style.overflow = 'hidden';
      }

      function openPanel() {
        document.getElementById('panel').classList.add('open');
        document.getElementById('panel').setAttribute('aria-hidden', 'false');
        document.getElementById('overlay').hidden = false;
      }
      function closePanel() {
        document.getElementById('panel').classList.remove('open');
        document.getElementById('panel').setAttribute('aria-hidden', 'true');
        document.getElementById('overlay').hidden = true;
      }

      function updateCountMeta() {
        var maxN = parseInt(document.getElementById('maxNum').value, 10) || 20;
        var perPage = parseInt(document.getElementById('perPage').value, 10);
        var cols = perPage <= 20 ? 5 : 4;
        var total = cols * Math.ceil(perPage / cols);
        var pages = parseInt(document.querySelector('#pagesSeg .active').dataset.pages, 10);
        document.getElementById('countMeta').textContent = '= ' + (total * pages) + ' 题';
      }

      function bindUI() {
        var maxInput = document.getElementById('maxNum');
        document.querySelector('.quick-btns').addEventListener('click', function(e) {
          var btn = e.target.closest('.quick-btn');
          if (!btn) return;
          maxInput.value = btn.dataset.val;
          updateCountMeta();
        });
        maxInput.addEventListener('input', updateCountMeta);

        document.querySelectorAll('.seg').forEach(function(seg) {
          seg.addEventListener('click', function(e) {
            var btn = e.target.closest('.seg-btn');
            if (!btn) return;
            seg.querySelectorAll('.seg-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            updateCountMeta();
          });
        });

        var slider = document.getElementById('perPage');
        slider.addEventListener('input', updateCountMeta);

        document.getElementById('generate').addEventListener('click', regenerate);
        document.getElementById('btnAnswer').addEventListener('click', function() {
          if (!state.questions.length) return;
          state.showAnswer = !state.showAnswer;
          applyAnswerClass();
        });
        document.getElementById('btnPrint').addEventListener('click', function() {
          if (!state.questions.length) return;
          window.print();
        });
        document.getElementById('btnMenu').addEventListener('click', openPanel);
        document.getElementById('panelClose').addEventListener('click', closePanel);
        document.getElementById('overlay').addEventListener('click', closePanel);

        var resizeTimer;
        window.addEventListener('resize', function() {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(function() {
            if (state.questions.length) render();
            else updateScale();
          }, 150);
        });
      }

      bindUI();
      updateCountMeta();
      regenerate();
    })();

    // 主题切换
    (function() {
      var toggle = document.getElementById('themeToggle');
      var html = document.documentElement;
      var savedTheme = localStorage.getItem('theme') || 'dark';
      html.setAttribute('data-theme', savedTheme);
      updateIcon(savedTheme);

      toggle.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon(next);
      });

      function updateIcon(theme) {
        toggle.textContent = theme === 'dark' ? '☀' : '☾';
      }
    })();
  </script>
</body>
</html>
